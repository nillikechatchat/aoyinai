<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="inkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1410;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#c53d43;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- 简约圆环 -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="url(#inkGrad)" stroke-width="2" opacity="0.6"/>
  
  <!-- 鸿雁抽象线条 -->
  <path d="M40 70 Q50 40 60 55 Q70 70 80 50" 
        fill="none" stroke="url(#inkGrad)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 渐进点 -->
  <circle cx="60" cy="55" r="4" fill="#c53d43"/>
  
  <!-- 装饰点 -->
  <circle cx="50" cy="50" r="2" fill="#8c7044" opacity="0.5"/>
  <circle cx="70" cy="50" r="2" fill="#8c7044" opacity="0.5"/>
</svg>