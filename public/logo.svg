<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="inkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1410;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8c7044;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c53d43;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vermilionGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c53d43;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e25a5a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 外圆环 -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#inkGradient)" stroke-width="3" opacity="0.8"/>
  
  <!-- 鸿雁抽象图案 -->
  <path d="M60 120 Q80 60 100 80 Q120 100 140 70 Q130 90 120 100 Q110 110 100 120 Q90 130 80 120 Z" 
        fill="url(#inkGradient)" opacity="0.9"/>
  
  <!-- 渐进箭头 -->
  <path d="M70 140 L100 100 L130 140" fill="none" stroke="url(#vermilionGradient)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- 中心点 -->
  <circle cx="100" cy="100" r="6" fill="#c53d43"/>
  
  <!-- 装饰点 -->
  <circle cx="85" cy="85" r="3" fill="#8c7044" opacity="0.6"/>
  <circle cx="115" cy="85" r="3" fill="#8c7044" opacity="0.6"/>
  <circle cx="100" cy="70" r="3" fill="#8c7044" opacity="0.6"/>
</svg>